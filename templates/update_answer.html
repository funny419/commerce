{% extends 'base.html' %}
{% block title %}답변 수정{% endblock %}
{% block content %}
<!-- Summernote CSS/JS (CDN) -->
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>

<h2 class="my-3">답변 수정</h2>
<form method="post" class="my-3">
    <div class="form-group">
        <label for="title">제목</label>
        <input type="text" class="form-control" name="title" id="title" value="{{ answer.title }}" required>
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea class="form-control" name="content" id="content" required>{{ answer.content }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">수정하기</button>
    <a href="{{ url_for('post_detail', post_id=answer.post_id) }}" class="btn btn-secondary">취소</a>
</form>

<script>
    $(document).ready(function() {
        $('#content').summernote({
            height: 300,
            lang: 'ko-KR'
        });
    });
</script>
{% endblock %}
