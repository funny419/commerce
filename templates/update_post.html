{% extends 'base.html' %}
{% block title %}글 수정{% endblock %}
{% block content %}
<h2 class="my-3">글 수정</h2>
<form method="post" class="my-3">
    <div class="form-group">
        <label for="title">제목</label>
        <input type="text" class="form-control" name="title" id="title" value="{{ post.title }}" required>
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea class="form-control" name="content" id="content" rows="10" required>{{ post.content }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">수정하기</button>
    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="btn btn-secondary">취소</a>
</form>
{% endblock %}
