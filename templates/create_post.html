{% extends 'base.html' %}

{% block title %}게시글 작성 - Flask Board{% endblock %}

{% block content %}
<!-- Summernote CSS/JS (CDN) -->
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>

<h2 class="my-3 border-bottom pb-2">게시글 작성</h2>

<form method="post">
    <div class="form-group">
        <label for="title">제목</label>
        <input type="text" class="form-control" name="title" id="title" required placeholder="제목을 입력하세요">
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea class="form-control" name="content" id="summernote" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">저장하기</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">취소</a>
</form>

<script>
    $(document).ready(function() {
        $('#summernote').summernote({
            height: 400,                 // 에디터 높이
            lang: 'ko-KR',               // 한글 설정
            placeholder: '내용을 입력해주세요.',
            toolbar: [
                ['style', ['style']],
                ['font', ['bold', 'underline', 'clear']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['table', ['table']],
                ['insert', ['link', 'picture', 'video']],
                ['view', ['fullscreen', 'codeview', 'help']]
            ]
        });
    });
</script>
{% endblock %}
