{% extends 'base.html' %}

{% block title %}댓글 수정{% endblock %}

{% block content %}
<!-- Summernote CSS/JS (CDN) -->
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>

<div class="container my-3">
    <h4 class="border-bottom pb-2">댓글 수정</h4>
    <form method="post">
        <div class="form-group">
            <textarea name="content" id="comment_content" class="form-control" required>{{ comment.content }}</textarea>
        </div>
        <div class="mt-2">
            <button type="submit" class="btn btn-primary">수정하기</button>
            <a href="{{ url_for('post_detail', post_id=comment.post_id) }}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>

<script>
    $(document).ready(function() {
        $('#comment_content').summernote({
            height: 150,
            lang: 'ko-KR',
            placeholder: '댓글을 입력하세요...',
            toolbar: [
                ['font', ['bold', 'underline', 'clear']],
                ['color', ['color']],
                ['insert', ['link']],
                ['view', ['codeview']]
            ]
        });
    });
</script>
{% endblock %}
