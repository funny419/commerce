name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. CI: 통합 테스트 및 빌드 검증 (GitHub 제공 Linux 서버에서 실행)
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python tests.py

      - name: Build Docker Image (Verification)
        run: docker build . --file Dockerfile --tag commerce-app:test

  # 2. CD: Windows 10 배포 (Self-hosted Runner 사용)
  # 주의: Windows 10 PC에 GitHub Actions Runner가 설치되어 있고, Docker Desktop이 실행 중이어야 합니다.
  deployment:
    needs: integration
    if: github.ref == 'refs/heads/main' # main 브랜치에 푸시된 경우에만 배포
    runs-on: self-hosted # 윈도우 서버에 등록한 Runner 태그
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        # GitHub Secrets에 저장된 값으로 .env 파일을 생성합니다.
        run: |
          echo APP_ENV=production > .env
          echo DATABASE_URI=mysql+pymysql://funny:strim100@db:3306/board?charset=utf8mb4 >> .env
          echo SECRET_KEY=${{ secrets.SECRET_KEY }} >> .env
        shell: cmd

      - name: Restart Services with Docker Compose
        run: |
          echo "Restarting services..."
          docker-compose down
          docker-compose up -d --build
          docker image prune -f
        shell: cmd