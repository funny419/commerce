name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. CI: 통합 테스트 및 빌드 검증 (GitHub 제공 Linux 서버에서 실행)
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

#      - name: Run Tests
#        run: python tests.py

      - name: Build Docker Image (Verification)
        run: docker build . --file Dockerfile --tag commerce-app:test

  # 2. CD: Windows 10 배포 (Self-hosted Runner 사용)
  # 주의: Windows 10 PC에 GitHub Actions Runner가 설치되어 있고, Docker Desktop이 실행 중이어야 합니다.
  deployment:
    needs: integration
    if: github.ref == 'refs/heads/main' # main 브랜치에 푸시된 경우에만 배포
    runs-on: [self-hosted, Windows, X64] # 윈도우 서버에 등록한 Runner 태그
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        shell: powershell
        run: |
          # PowerShell Here-String을 사용하여 .env 내용을 변수에 담고 한 번에 저장합니다.
          $envContent = @"
          APP_ENV=production
          DATABASE_URI=mysql+pymysql://funny:${{ secrets.BOARD_MYSQL_PASSWORD }}@db:3306/board?charset=utf8mb4
          SECRET_KEY=${{ secrets.BOARD_MYSQL_PASSWORD }}
          BOARD_MYSQL_PASSWORD=${{ secrets.BOARD_MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.BOARD_MYSQL_PASSWORD }}
          MYSQL_PASSWORD=${{ secrets.BOARD_MYSQL_PASSWORD }}
          MYSQL_DATABASE=board
          MYSQL_USER=funny
          "@
          $envContent | Out-File -FilePath .env -Encoding ascii

      - name: Restart Services with Docker Compose
        shell: powershell
        run: |
          Write-Host "Restarting services on Windows 10..."
          docker-compose down
          docker-compose up -d --build

      - name: Initialize Database
        shell: powershell
        run: |
          Write-Host "Initializing database (creating tables if not exist)..."
          # init_db.py 스크립트는 DB가 준비될 때까지 몇 초간 재시도 후 테이블을 생성합니다.
          # 이 과정이 성공하면 DB 접속이 정상적으로 이루어진 것입니다.
          docker-compose exec -T web python init_db.py

      - name: Clean up unused Docker images
        shell: powershell
        run: |
          Write-Host "Cleaning up unused docker images..."
          docker image prune -f