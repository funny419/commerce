name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. CI: 통합 테스트 및 빌드 검증 (GitHub 제공 Linux 서버에서 실행)
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python tests.py

      - name: Build Docker Image (Verification)
        run: docker build . --file Dockerfile --tag commerce-app:test

  # 2. CD: Windows 10 배포 (Self-hosted Runner 사용)
  # 주의: Windows 10 PC에 GitHub Actions Runner가 설치되어 있고, Docker Desktop이 실행 중이어야 합니다.
  deployment:
    needs: integration
    if: github.ref == 'refs/heads/main' # main 브랜치에 푸시된 경우에만 배포
    runs-on: [self-hosted, Windows, X64] # 윈도우 서버에 등록한 Runner 태그
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        shell: pwsh
        run: |
          # Out-File 명령은 첫 줄 생성 시, Add-Content는 추가 시 사용합니다.
          "APP_ENV=production" | Out-File -FilePath .env -Encoding ascii
          "DATABASE_URI=mysql+pymysql://funny:${{ secrets.BOARD_MYSQL_PASSWORD }}@db:4806/board?charset=utf8mb4" | Add-Content -Path .env
          # 아래 줄이 추가되어야 DB 컨테이너가 정상적으로 뜹니다.
          "MYSQL_ROOT_PASSWORD=${{ secrets.BOARD_MYSQL_PASSWORD }}" | Add-Content -Path .env
          "MYSQL_PASSWORD=${{ secrets.BOARD_MYSQL_PASSWORD }}" | Add-Content -Path .env
          "MYSQL_DATABASE=board" | Add-Content -Path .env
          "MYSQL_USER=funny" | Add-Content -Path .env

      - name: Restart Services with Docker Compose
        shell: pwsh
        run: |
          Write-Host "Restarting services on Windows 10..."
          docker-compose down
          docker-compose up -d --build
          # 미사용 이미지 정리 (공간 확보)
          docker image prune -f