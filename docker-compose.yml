version: '3.8'

services:
  web:
    build: .
    container_name: flask-server
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mariadb:10.5
    container_name: mariadb-server
    restart: always
    environment:
      # 루트 비밀번호는 더 강력한 값으로 변경하는 것을 권장합니다.
      MYSQL_ROOT_PASSWORD: ${BOARD_MYSQL_PASSWORD}
      MYSQL_DATABASE: 'board'
      MYSQL_USER: 'funny'
      MYSQL_PASSWORD: ${BOARD_MYSQL_PASSWORD}
    ports:
      - "4807:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # 비밀번호 없이 TCP 3306 포트가 응답하는지만 확인 (가장 확실하고 깔끔함)
      test: ["CMD-SHELL", "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/3306' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: